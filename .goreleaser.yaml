# .goreleaser.yaml
version: 2

project_name: devproxy

before:
  hooks:
    - go mod tidy

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
    main: ./main.go
    binary: devproxy
    ldflags:
      - -s -w -X github.com/daydaychen/devproxy/pkg/util.Version={{.Version}}

archives:
  - format: tar.gz
    # use zip for windows archives
    format_overrides:
      - goos: windows
        format: zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - README.md
      - LICENSE
      - EXAMPLES.md
      - README_CN.md

checksum:
  name_template: 'checksums.txt'

snapshot:
  name_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'

release:
  github:
    owner: chentt # 这里的 owner 之后用户可能需要根据实际情况修改
    name: devproxy
  draft: false
  prerelease: auto
