name: Bug Report
description: 报告 bug 或问题
labels: ["bug"]
body:

  - type: markdown
    attributes:
      value: |
        感谢你提交 bug 报告！请尽可能详细地描述问题。

  - type: input
    id: version
    attributes:
      label: smart-proxy 版本
      description: 可以通过运行 `smart-proxy --version` 获取版本号
      placeholder: e.g., v1.0.0
    validations:
      required: true

  - type: input
    id: go-version
    attributes:
      label: Go 版本
      description: 运行 `go version` 获取
      placeholder: e.g., go1.25.6 darwin/amd64
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: 操作系统
      options:
        - macOS
        - Linux
        - Windows
        - 其他
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: 问题描述
      description: 清晰描述遇到的问题
      placeholder: 描述你遇到的问题...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      description: 详细描述如何复现此问题
      placeholder: |
        1. 运行命令 A
        2. 执行操作 B
        3. 看到错误/异常行为
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 预期行为
      description: 你期望的行为是什么？
      placeholder: 期望...
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: 实际行为
      description: 实际发生了什么？
      placeholder: 实际...
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: 相关日志
      description: 如果有错误日志，请粘贴在此（使用 ``` 包裹）
      placeholder: |
        ```
        日志内容
        ```
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: 附加信息
      description: 其他有助于解决问题的信息
    validations:
      required: false
