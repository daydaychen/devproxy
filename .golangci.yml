# golangci-lint 配置文件

run:
  timeout: 5m
  tests: true

linters:
  enable:
    - gofmt
    - goimports
    - staticcheck

linters-settings:
  goimports:
    local-prefixes: github.com/daydaychen/devproxy

issues:
  exclude-rules:
    # 忽略测试文件中的问题
    - path: _test\.go
      linters:
        - unused

    # 忽略 perf_optimization_test 中的代码示例
    - path: perf_optimization_test\.go
      linters:
        - unused

    - path: examples/
      linters:
        - govet

    # 忽略 completedSent 的 ineffectual assignment（这是防重发的保护逻辑）
    - text: "ineffectual assignment to completedSent"
      linters:
        - ineffassign