# golangci-lint 配置文件

run:
  timeout: 5m
  tests: true

output:
  formats:
    - format: colored-line-number

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - typecheck
    - unused
    - gofmt
    - goimports
    - misspell
    - unconvert
    - dupl
    - goconst
    - gocyclo
    - gosec
    - bodyclose
    - noctx
    - sqlclosecheck

linters-settings:
  errcheck:
    check-type-assertions: true
    check-blank: true

  govet:
    enable-all: true

  goimports:
    local-prefixes: github.com/daydaychen/devproxy

  dupl:
    threshold: 100

  goconst:
    min-len: 3
    min-occurrences: 3

  gocyclo:
    min-complexity: 10

  misspell:
    locale: US

  gosec:
    excludes:
      - G204

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - dupl
        - gosec

    - path: examples/
      linters:
        - dupl

  max-issues-per-linter: 50
  max-same-issues: 3